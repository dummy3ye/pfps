<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pfps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="index.js" defer></script>
</head>
<body class="transition-colors">
    <aside class="sidebar category-sidebar flex flex-col">
        <div class="flex-grow">
            <h1 class="text-xl font-bold mb-8 dark:text-white">pfps</h1>
            <nav id="category-list" class="space-y-1"></nav>
        </div>
        <button id="theme-toggle" class="p-2 w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-zinc-900 hover:bg-gray-200 dark:hover:bg-zinc-800 mt-auto" title="Toggle Theme">
            <svg id="sun-icon" class="hidden w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.757 7.757l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            <svg id="moon-icon" class="hidden w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
    </aside>

    <main class="main-content">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h2 id="current-category" class="text-2xl font-semibold capitalize">all</h2>
            <div class="relative w-full md:w-80">
                <input type="text" id="search-input" placeholder="Search by name, path, or tags..." 
                    class="w-full bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 outline-none">
                <svg class="absolute right-3 top-3 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </header>
        
        <div id="pfp-grid" class="pfp-grid"></div>

        <a id="upload-btn" href="/upload" class="hidden fixed bottom-8 right-8 lg:right-[340px] w-14 h-14 bg-gray-900 dark:bg-white text-white dark:text-zinc-950 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 z-[100]">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </a>
    </main>

    <aside id="details-sidebar" class="sidebar details-sidebar hidden lg:block">
        <div id="details-content" class="hidden">
            <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-widest">Image Details</h3>
            <div class="aspect-square bg-gray-50 dark:bg-zinc-900 rounded-xl border dark:border-zinc-800 overflow-hidden mb-6">
                <img id="detail-image" src="" class="w-full h-full object-cover">
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Name</label>
                    <p id="detail-name" class="text-sm font-semibold break-all"></p>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Path</label>
                    <p id="detail-path" class="text-[11px] font-mono break-all text-gray-500"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Resolution</label>
                        <p id="detail-resolution" class="text-xs font-mono text-gray-600 dark:text-zinc-400"></p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Size</label>
                        <p id="detail-size" class="text-xs font-mono text-gray-600 dark:text-zinc-400"></p>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Date Added</label>
                    <p id="detail-date" class="text-xs font-mono text-gray-600 dark:text-zinc-400"></p>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Tags</label>
                    <div id="detail-tags" class="flex flex-wrap gap-2"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Source</label>
                    <p id="detail-source" class="text-xs italic text-gray-500 break-all"></p>
                </div>
            </div>

            <button id="download-btn" class="mt-10 w-full py-3 bg-gray-900 dark:bg-white text-white dark:text-zinc-950 rounded-xl text-xs font-bold uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all shadow-lg">
                Download Image
            </button>
        </div>
        <div id="details-empty" class="h-full flex items-center justify-center">
            <p class="text-gray-400 text-sm italic opacity-60">Select an image to view details</p>
        </div>
    </aside>
</body>
</html>
